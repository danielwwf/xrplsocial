name: Update Amendment Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache rippled mirror
        uses: actions/cache@v4
        with:
          path: ~/rippled-mirror
          key: rippled-mirror-${{ github.run_id }}
          restore-keys: |
            rippled-mirror-

      - name: Fetch or clone rippled
        run: |
          set -e
          MIRROR_DIR="$HOME/rippled-mirror"
          
          if [ -d "$MIRROR_DIR/.git" ]; then
            echo "Updating existing mirror..."
            cd "$MIRROR_DIR"
            git fetch origin --prune
          else
            echo "Creating fresh mirror..."
            mkdir -p "$MIRROR_DIR"
            git clone --mirror https://github.com/XRPLF/rippled.git "$MIRROR_DIR"
            cd "$MIRROR_DIR"
          fi
          
          echo "Mirror ready at: $(pwd)"
          du -sh .

      - name: Analyze branches
        run: |
          python3 << 'PYEOF'
          import subprocess
          import json
          import os
          from datetime import datetime
          from collections import defaultdict

          MIRROR_DIR = os.path.expanduser('~/rippled-mirror')

          def run_git(args):
              result = subprocess.run(
                  ['git'] + args,
                  capture_output=True,
                  text=True,
                  cwd=MIRROR_DIR
              )
              return result.stdout.strip()

          # Get all branches
          print("Fetching branches...")
          branches_output = run_git(['branch', '-r', '--format=%(refname:short)'])
          all_branches = [b for b in branches_output.split('\n') if b and not b.endswith('/HEAD')]

          # Filter feature branches
          feature_branches = []
          for branch in all_branches:
              name = branch.replace('origin/', '')
              if name not in ['master', 'main', 'develop'] and not name.startswith('release'):
                  feature_branches.append(branch)

          print(f"Analyzing {len(feature_branches)} feature branches...")

          results = []
          all_contributors = defaultdict(lambda: {'commits': 0, 'branches': set(), 'last_active': None})

          for branch in feature_branches[:150]:  # Limit for now, can increase
              name = branch.replace('origin/', '')
              
              try:
                  # Get all commits for this branch
                  log_output = run_git(['log', '--format=%H|%an|%ae|%at|%s', branch])
                  if not log_output:
                      continue

                  commits = []
                  branch_contributors = {}
                  
                  for line in log_output.split('\n'):
                      if '|' not in line:
                          continue
                      parts = line.split('|', 4)
                      if len(parts) < 5:
                          continue
                          
                      commit_hash, author_name, author_email, timestamp, message = parts
                      ts = int(timestamp)
                      
                      commits.append({
                          'hash': commit_hash[:8],
                          'author': author_name,
                          'email': author_email,
                          'date': datetime.utcfromtimestamp(ts).isoformat() + 'Z',
                          'message': message[:100]
                      })
                      
                      # Track unique contributors for this branch
                      if author_email not in branch_contributors:
                          branch_contributors[author_email] = {
                              'name': author_name,
                              'email': author_email,
                              'commits': 0
                          }
                      branch_contributors[author_email]['commits'] += 1
                      
                      # Global contributor stats
                      all_contributors[author_email]['commits'] += 1
                      all_contributors[author_email]['branches'].add(name)
                      if not all_contributors[author_email]['last_active'] or ts > all_contributors[author_email].get('last_ts', 0):
                          all_contributors[author_email]['last_active'] = datetime.utcfromtimestamp(ts).isoformat() + 'Z'
                          all_contributors[author_email]['last_ts'] = ts

                  if not commits:
                      continue

                  # Sort commits by date (newest first)
                  commits.sort(key=lambda x: x['date'], reverse=True)
                  
                  results.append({
                      'name': name,
                      'last_commit': commits[0],
                      'commit_count': len(commits),
                      'contributors': list(branch_contributors.values()),
                      'recent_commits': commits[:20]  # Last 20 for display
                  })
                  
                  print(f"  ✓ {name}: {len(commits)} commits, {len(branch_contributors)} contributors")
                  
              except Exception as e:
                  print(f"  ✗ {name}: {e}")

          # Sort branches by last activity (newest first)
          results.sort(key=lambda x: x['last_commit']['date'], reverse=True)

          # Prepare contributor list
          contributors_list = []
          for email, stats in sorted(all_contributors.items(), key=lambda x: x[1]['commits'], reverse=True):
              contributors_list.append({
                  'email': email,
                  'name': list(stats['branches'])[0] if stats['branches'] else 'Unknown',
                  'commits': stats['commits'],
                  'branches': sorted(list(stats['branches'])),
                  'last_active': stats['last_active']
              })

          output = {
              'generated_at': datetime.utcnow().isoformat() + 'Z',
              'repo': 'XRPLF/rippled',
              'total_branches': len(results),
              'total_contributors': len(contributors_list),
              'branches': results,
              'contributors': contributors_list
          }

          os.makedirs('stats/data', exist_ok=True)
          with open('stats/data/branches.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"\n✓ Done: {len(results)} branches, {len(contributors_list)} contributors")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data/branches.json
          
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "Update stats $(date -u +%H:%M)"
          
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              git push origin main
              exit 0
            fi
            echo "Retry $i..."
            sleep 2
          done
          
          exit 1
