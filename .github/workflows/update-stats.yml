name: Update Amendment Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch stats
        run: |
          python3 << 'EOF'
          import json, urllib.request, os
          from datetime import datetime

          API = 'https://api.github.com/repos/XRPLF/rippled'
          
          def get(url):
              req = urllib.request.Request(url)
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('User-Agent', 'XRPL-Stats/1.0')
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          print("Fetching branches...")
          branches = get(f'{API}/branches?per_page=100')
          
          results = []
          for b in branches:
              name = b['name']
              if name in ['master','main','develop'] or name.startswith('release'):
                  continue
              try:
                  c = get(b['commit']['url'])
                  a = c.get('author') or {}
                  results.append({
                      'name': name,
                      'commit': {
                          'sha': c['sha'][:8],
                          'author': {'login': a.get('login'), 'avatar_url': a.get('avatar_url')},
                          'commit': {
                              'message': c['commit']['message'].split('\n')[0][:80],
                              'committer': {'date': c['commit']['committer']['date']}
                          }
                      }
                  })
                  print(f"  ✓ {name}")
              except Exception as e:
                  print(f"  ✗ {name}: {e}")

          output = {
              'generated_at': datetime.utcnow().isoformat() + 'Z',
              'repo': 'XRPLF/rippled',
              'total_branches': len(results),
              'branches': results
          }

          os.makedirs('stats/data', exist_ok=True)
          with open('stats/data/branches.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"\nDone: {len(results)} branches")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data/branches.json
          
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "Update stats $(date -u +%H:%M)"
          
          # Handle concurrent updates from other workflows
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              git push origin main
              exit 0
            fi
            echo "Retry $i..."
            sleep 2
          done
          
          echo "Failed to push after retries"
          exit 1
