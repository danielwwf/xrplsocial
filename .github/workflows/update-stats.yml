name: Update Amendment Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone XRPL rippled
        run: |
          REPO_DIR="$HOME/rippled"
          
          if [ -d "$REPO_DIR/.git" ]; then
            echo "Updating existing clone..."
            cd "$REPO_DIR"
            git fetch origin
          else
            echo "Creating fresh clone (full history, ~2-3 minutes)..."
            rm -rf "$REPO_DIR"
            # Full clone to get all branches
            git clone https://github.com/XRPLF/rippled.git "$REPO_DIR"
          fi
          
          cd "$REPO_DIR"
          # Fetch all remote branches
          git remote update

      - name: Clone XRPL Standards
        run: |
          STANDARDS_DIR="$HOME/xrpl-standards"
          
          if [ -d "$STANDARDS_DIR/.git" ]; then
            echo "Updating XRPL Standards..."
            cd "$STANDARDS_DIR"
            git pull
          else
            echo "Cloning XRPL Standards..."
            git clone https://github.com/XRPLF/XRPL-Standards.git "$STANDARDS_DIR"
          fi
          git fetch --all

      - name: Extract branch data
        run: |
          cd "$HOME/rippled"
          
          # Ensure we have all remote branches
          git remote update
          git fetch --all --prune
          
          echo "Remote branches:"
          git branch -r | wc -l
          git branch -r | head -20
          echo ""
          
          # Load previous data to track vanished branches
          WORKSPACE="${GITHUB_WORKSPACE:-$(pwd)}"
          DATA_DIR="$WORKSPACE/stats/data"
          PREV_FILE="$DATA_DIR/branches.json"
          COMPLETED_FILE="$DATA_DIR/completed.json"
          
          python3 << 'PYEOF'
          import subprocess
          import json
          import os
          from datetime import datetime, timezone
          from collections import defaultdict

          REPO_DIR = os.path.expanduser('~/rippled')
          STANDARDS_DIR = os.path.expanduser('~/xrpl-standards')
          WORKSPACE = os.environ.get('GITHUB_WORKSPACE', os.getcwd())
          DATA_DIR = os.path.join(WORKSPACE, 'stats', 'data')
          PREV_FILE = os.path.join(DATA_DIR, 'branches.json')
          COMPLETED_FILE = os.path.join(DATA_DIR, 'completed.json')

          def git(args):
              result = subprocess.run(
                  ['git'] + args,
                  capture_output=True,
                  text=True,
                  cwd=REPO_DIR
              )
              return result.stdout.strip(), result.stderr.strip(), result.returncode

          # Load previous branches to track vanished ones
          prev_branches = {}
          if os.path.exists(PREV_FILE):
              try:
                  with open(PREV_FILE, 'r') as f:
                      prev_data = json.load(f)
                      prev_branches = {b['name']: b for b in prev_data.get('branches', [])}
                  print(f"Loaded {len(prev_branches)} previous branches")
              except Exception as e:
                  print(f"Could not load previous data: {e}")

          # Load existing completed branches
          completed_branches = []
          if os.path.exists(COMPLETED_FILE):
              try:
                  with open(COMPLETED_FILE, 'r') as f:
                      completed_branches = json.load(f)
                  print(f"Loaded {len(completed_branches)} previously completed branches")
              except Exception as e:
                  print(f"Could not load completed data: {e}")

          # Parse XLS (XRPL Standards) for official amendment definitions
          xls_standards = {}
          try:
              if os.path.exists(STANDARDS_DIR):
                  for folder in os.listdir(STANDARDS_DIR):
                      if folder.startswith('XLS-') or folder.startswith('xls-'):
                          # Extract XLS number and name
                          parts = folder.split('-', 2)
                          if len(parts) >= 2:
                              xls_num = parts[1]  # e.g., "0030"
                              name_part = parts[2] if len(parts) > 2 else ""
                              
                              # Read README if exists
                              readme_path = os.path.join(STANDARDS_DIR, folder, 'README.md')
                              title = name_part.replace('-', ' ').title()
                              
                              if os.path.exists(readme_path):
                                  try:
                                      with open(readme_path, 'r') as f:
                                          content = f.read()
                                          # Try to extract title from first line
                                          lines = content.split('\n')
                                          for line in lines[:5]:
                                              if line.strip().startswith('# '):
                                                  title = line.strip()[2:].strip()
                                                  break
                                  except:
                                      pass
                              
                              xls_standards[xls_num] = {
                                  'folder': folder,
                                  'name': title,
                                  'slug': name_part
                              }
                  
                  print(f"Loaded {len(xls_standards)} XLS standards")
                  # Print some examples
                  for num, data in list(xls_standards.items())[:5]:
                      print(f"  XLS-{num}: {data['name']}")
          except Exception as e:
              print(f"Could not parse XLS standards: {e}")

          # Get remote branches
          stdout, stderr, code = git(['branch', '-r', '--format=%(refname:short)'])
          
          if code != 0:
              print(f"Git error: {stderr}")
              exit(1)
          
          all_branches = [b for b in stdout.split('\n') if b and not b.endswith('/HEAD')]
          current_names = set(b.replace('origin/', '') for b in all_branches)
          print(f"Total remote branches: {len(all_branches)}")
          
          # Determine if this is first run (no previous data) or incremental
          # Force full history until all branches have sufficient commits
          last_scan_time = None
          
          # Check if existing data looks complete (all branches have commits array with data)
          data_looks_complete = False
          if prev_branches and len(prev_branches) > 100:
              # Sample 10 random branches to check if they have commits
              sample_branches = list(prev_branches.values())[:10]
              branches_with_commits = sum(1 for b in sample_branches if b.get('commits') and len(b.get('commits', [])) > 5)
              
              if branches_with_commits >= 8:  # 80% of sampled branches have commits
                  data_looks_complete = True
                  print(f"Data looks complete ({branches_with_commits}/10 branches have commits)")
          
          if data_looks_complete:
              # Get the most recent commit date from existing data
              all_dates = []
              for b in prev_branches.values():
                  if b.get('last_commit', {}).get('date'):
                      all_dates.append(b['last_commit']['date'])
              if all_dates:
                  last_scan_time = max(all_dates)
                  print(f"Incremental mode: Only fetching commits after {last_scan_time}")
          else:
              print("Full history mode: Fetching ALL commits for all branches")

          # Find vanished branches (were there before, now gone)
          vanished = []
          for name, data in prev_branches.items():
              if name not in current_names:
                  if not any(c['name'] == name for c in completed_branches):
                      vanished.append({
                          'name': name,
                          'last_commit': data.get('last_commit'),
                          'contributor_count': data.get('contributor_count', 0),
                          'contributors': data.get('contributors', []),
                          'completed_at': datetime.now(timezone.utc).isoformat(),
                          'reason': 'merged_or_deleted'
                      })
          
          if vanished:
              print(f"Found {len(vanished)} newly vanished branches")
              completed_branches.extend(vanished)
              completed_branches.sort(key=lambda x: x.get('completed_at', ''), reverse=True)

          # Fetch ALL merged PRs from GitHub API
          # Using GITHUB_TOKEN for 5000 req/h limit
          api_completed = []
          try:
              import urllib.request
              import urllib.error
              
              token = os.environ.get('GITHUB_TOKEN', '')
              headers = {
                  "Accept": "application/vnd.github.v3+json", 
                  "User-Agent": "xrpl-stats",
                  "Authorization": f"token {token}"
              }
              
              existing_names = {c['name'] for c in completed_branches}
              
              page = 1
              max_pages = 50  # 50 * 100 = 5000 max
              
              while page <= max_pages:
                  url = f"https://api.github.com/repos/XRPLF/rippled/pulls?state=closed&per_page=100&sort=updated&direction=desc&page={page}"
                  
                  req = urllib.request.Request(url, headers=headers)
                  try:
                      with urllib.request.urlopen(req, timeout=30) as response:
                          prs = json.loads(response.read().decode())
                  except urllib.error.HTTPError as e:
                      print(f"GitHub API error on page {page}: {e.code}")
                      break
                  
                  if not prs:
                      print(f"Page {page}: No more PRs")
                      break
                  
                  new_count = 0
                  for pr in prs:
                      if pr.get("merged_at"):  # Only merged PRs
                          branch_name = pr.get("head", {}).get("ref", "")
                          if branch_name and branch_name not in existing_names:
                              skip_main = ['master', 'main', 'develop', 'release/', 'gh-pages']
                              if not any(branch_name.startswith(p) or branch_name == p for p in skip_main):
                                  api_completed.append({
                                      "name": branch_name,
                                      "last_commit": {
                                          "hash": pr.get("merge_commit_sha", "")[:8] if pr.get("merge_commit_sha") else "",
                                          "author": pr.get("user", {}).get("login", ""),
                                          "email": "",
                                          "date": pr.get("merged_at"),
                                          "message": pr.get("title", "")[:100]
                                      },
                                      "contributor_count": 0,
                                      "contributors": [],
                                      "completed_at": pr.get("merged_at"),
                                      "reason": "merged_via_api",
                                      "pr_number": pr.get("number")
                                  })
                                  existing_names.add(branch_name)
                                  new_count += 1
                  
                  print(f"Page {page}: {len(prs)} PRs checked, {new_count} new merged")
                  
                  if len(prs) < 100:
                      print(f"Reached end of PR list at page {page}")
                      break
                  
                  page += 1
              
              if api_completed:
                  completed_branches.extend(api_completed)
                  completed_branches.sort(key=lambda x: x.get('completed_at', ''), reverse=True)
                  print(f"\n✅ Total: Added {len(api_completed)} merged PRs")
                  print(f"   Total completed branches: {len(completed_branches)}")
              
              # Fetch rich details for TOP 100 newest completed PRs
              rich_prs = []
              top_100 = completed_branches[:100]
              print(f"\nFetching rich details for top 100 PRs...")
              
              for idx, pr_data in enumerate(top_100):
                  if not pr_data.get('pr_number'):
                      continue
                  
                  pr_num = pr_data['pr_number']
                  try:
                      # PR details
                      pr_url = f"https://api.github.com/repos/XRPLF/rippled/pulls/{pr_num}"
                      req = urllib.request.Request(pr_url, headers=headers)
                      with urllib.request.urlopen(req, timeout=10) as resp:
                          pr_detail = json.loads(resp.read().decode())
                      
                      # Comments
                      comments_url = f"https://api.github.com/repos/XRPLF/rippled/issues/{pr_num}/comments"
                      req = urllib.request.Request(comments_url, headers=headers)
                      with urllib.request.urlopen(req, timeout=10) as resp:
                          comments = json.loads(resp.read().decode())
                      
                      # Reviews
                      reviews_url = f"https://api.github.com/repos/XRPLF/rippled/pulls/{pr_num}/reviews"
                      req = urllib.request.Request(reviews_url, headers=headers)
                      with urllib.request.urlopen(req, timeout=10) as resp:
                          reviews = json.loads(resp.read().decode())
                      
                      rich_prs.append({
                          'pr_number': pr_num,
                          'branch_name': pr_data['name'],
                          'title': pr_detail.get('title', ''),
                          'body': pr_detail.get('body', '')[:2000] if pr_detail.get('body') else '',
                          'user': pr_detail.get('user', {}).get('login', ''),
                          'state': pr_detail.get('state', ''),
                          'merged': pr_detail.get('merged_at') is not None,
                          'created_at': pr_detail.get('created_at', ''),
                          'merged_at': pr_detail.get('merged_at', ''),
                          'labels': [l.get('name', '') for l in pr_detail.get('labels', [])],
                          'comments_count': len(comments),
                          'comments': [{'user': c.get('user', {}).get('login', ''), 'body': c.get('body', '')[:500], 'created_at': c.get('created_at', '')} for c in comments[:5]],
                          'reviews_count': len(reviews),
                          'reviews': [{'user': r.get('user', {}).get('login', ''), 'state': r.get('state', ''), 'body': r.get('body', '')[:200] if r.get('body') else ''} for r in reviews[:3]]
                      })
                      
                      if (idx + 1) % 10 == 0:
                          print(f"  {idx + 1}/100 rich PRs fetched...")
                      
                  except Exception as e:
                      print(f"  Error fetching PR #{pr_num}: {e}")
                      continue
              
              # Save rich PRs
              RICH_PRS_FILE = os.path.join(DATA_DIR, 'rich_prs.json')
              with open(RICH_PRS_FILE, 'w') as f:
                  json.dump(rich_prs, f, indent=2)
              print(f"\n✅ Saved {len(rich_prs)} rich PR details")
              
          except Exception as e:
              print(f"Could not fetch PRs: {e}")
              import traceback
              traceback.print_exc()

          # Filter feature branches
          skip = ['master', 'main', 'develop', 'release/', 'gh-pages']
          feature_branches = []
          for branch in all_branches:
              name = branch.replace('origin/', '')
              if not any(name.startswith(p) or name == p for p in skip):
                  feature_branches.append((branch, name))
          
          print(f"Feature branches: {len(feature_branches)}")

          # Process branches with FULL commit history
          results = []
          all_commits = []  # For timeline
          contributor_stats = defaultdict(lambda: {'commits': 0, 'branches': set(), 'last_commit': None, 'last_ts': 0})
          
          # If incremental, start with existing branches and update them
          if last_scan_time and prev_branches:
              print(f"Incremental: Loading {len(prev_branches)} existing branches...")
              for name, data in prev_branches.items():
                  results.append(data)
                  # Add existing commits to timeline
                  for c in data.get('commits', []):
                      all_commits.append({
                          'hash': c['hash'],
                          'author': c['author'],
                          'branch': name,
                          'date': c['date'],
                          'message': c['message']
                      })
                  # Restore contributor stats
                  for contrib in data.get('contributors', []):
                      email = contrib.get('email', '')
                      if email:
                          contributor_stats[email]['commits'] += contrib.get('commits', 1)
                          contributor_stats[email]['branches'].add(name)
                          contributor_stats[email]['last_commit'] = data.get('last_commit', {}).get('date')

          for full_ref, name in feature_branches[:300]:
              try:
                  # Determine how many commits to fetch
                  if last_scan_time:
                      # Incremental: Only new commits since last scan
                      stdout, _, code = git(['log', f'--since={last_scan_time}', '--format=%H|%an|%ae|%at|%s', full_ref])
                  else:
                      # First run: Get up to 100 commits per branch
                      stdout, _, code = git(['log', '-100', '--format=%H|%an|%ae|%at|%s', full_ref])
                  
                  if code != 0 or not stdout:
                      continue
                  
                  commits = []
                  for line in stdout.strip().split('\n'):
                      if not line:
                          continue
                      parts = line.split('|', 4)
                      if len(parts) != 5:
                          continue
                      
                      hash, author, email, ts_str, msg = parts
                      
                      try:
                          ts = int(ts_str)
                          if ts <= 0:
                              continue
                      except:
                          continue
                      
                      date = datetime.fromtimestamp(ts, tz=timezone.utc).isoformat()
                      commits.append({
                          'hash': hash[:8],
                          'author': author,
                          'email': email,
                          'date': date,
                          'message': msg[:200]
                      })
                      
                      # Add to global timeline
                      all_commits.append({
                          'hash': hash[:8],
                          'author': author,
                          'branch': name,
                          'date': date,
                          'message': msg[:200]
                      })
                  
                  if not commits:
                      continue
                  
                  # Get unique contributors
                  contrib_out, _, _ = git(['log', '-100', '--format=%ae|%an', full_ref])
                  contributors = []
                  seen = set()
                  
                  for line in contrib_out.split('\n'):
                      if '|' in line:
                          e, n = line.split('|', 1)
                          if e and e not in seen:
                              seen.add(e)
                              contributors.append({'email': e, 'name': n})
                              contributor_stats[e]['commits'] += 1
                              contributor_stats[e]['branches'].add(name)
                  
                  # For incremental mode, update existing branch or add new
                  existing_idx = None
                  if last_scan_time:
                      for i, r in enumerate(results):
                          if r['name'] == name:
                              existing_idx = i
                              break
                  
                  branch_data = {
                      'name': name,
                      'last_commit': commits[0],  # Most recent
                      'commits': commits[:50],  # Store up to 50 commits per branch
                      'contributor_count': len(contributors),
                      'contributors': contributors[:15]
                  }
                  
                  if existing_idx is not None:
                      # Update existing branch (prepend new commits)
                      old_commits = results[existing_idx].get('commits', [])
                      all_branch_commits = commits[:50] + old_commits
                      branch_data['commits'] = all_branch_commits[:50]  # Keep max 50
                      results[existing_idx] = branch_data
                  else:
                      results.append(branch_data)
                  
              except Exception as e:
                  print(f"Error on {name}: {e}")
                  continue
          
          # Sort all commits for timeline
          all_commits.sort(key=lambda x: x['date'], reverse=True)
          
          print(f"Total commits collected: {len(all_commits)}")
          print(f"Branches processed: {len(results)}")

          results.sort(key=lambda x: x['last_commit']['date'], reverse=True)
          
          contributors_list = []
          for email, s in sorted(contributor_stats.items(), key=lambda x: x[1]['commits'], reverse=True):
              if s['commits'] > 0 and s['last_commit']:
                  contributors_list.append({
                      'email': email,
                      'name': list(s['branches'])[0],
                      'commits': s['commits'],
                      'branches': sorted(list(s['branches'])),
                      'last_active': s['last_commit']
                  })

          # Save XLS standards mapping
          XLS_FILE = os.path.join(DATA_DIR, 'xls_standards.json')
          with open(XLS_FILE, 'w') as f:
              json.dump(xls_standards, f, indent=2)
          print(f"Saved {len(xls_standards)} XLS standards mapping")

          # Save branches.json
          output = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'repo': 'XRPLF/rippled',
              'total_branches': len(results),
              'total_contributors': len(contributors_list),
              'branches': results,
              'contributors': contributors_list
          }

          os.makedirs(DATA_DIR, exist_ok=True)
          
          with open(PREV_FILE, 'w') as f:
              json.dump(output, f, indent=2)

          # Save completed.json
          with open(COMPLETED_FILE, 'w') as f:
              json.dump(completed_branches, f, indent=2)
          
          # Save timeline data (all commits)
          TIMELINE_FILE = os.path.join(DATA_DIR, 'timeline.json')
          with open(TIMELINE_FILE, 'w') as f:
              json.dump(all_commits[:500], f, indent=2)  # Top 500 for timeline
          
          print(f"\n✅ SUCCESS: {len(results)} branches, {len(completed_branches)} completed, {len(all_commits)} total commits")
          PYEOF

      - name: AI Categorize Branches
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/integrate_categories.py
          echo "Categories integrated"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data/branches.json stats/data/completed.json stats/data/timeline.json stats/data/rich_prs.json stats/data/xls_standards.json stats/data/ai_categories.json stats/data/category_summary.json stats/index.html scripts/ai_categorize.py scripts/integrate_categories.py
          git diff --cached --quiet || (git commit -m "Update stats $(date -u +%H:%M)" && git pull --rebase origin main && git push)
