name: Update Amendment Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git Mirror
        run: |
          MIRROR_DIR="$HOME/rippled-mirror"
          
          if [ -d "$MIRROR_DIR/.git" ]; then
            echo "Using existing mirror..."
            cd "$MIRROR_DIR"
            git fetch origin --prune
          else
            echo "Creating mirror (one-time, ~2-3 minutes)..."
            mkdir -p "$MIRROR_DIR"
            # Shallow clone first, then unshallow to get full history
            git clone --mirror --depth=100 https://github.com/XRPLF/rippled.git "$MIRROR_DIR"
            cd "$MIRROR_DIR"
            # Fetch all refs
            git remote update
          fi
          
          echo "Mirror ready. Total refs:"
          git branch -r | wc -l

      - name: Extract all branch data
        run: |
          python3 << 'PYEOF'
          import subprocess
          import json
          import os
          import re
          from datetime import datetime, timezone
          from collections import defaultdict

          MIRROR_DIR = os.path.expanduser('~/rippled-mirror')

          def git(args):
              """Run git command in mirror dir"""
              result = subprocess.run(
                  ['git'] + args,
                  capture_output=True,
                  text=True,
                  cwd=MIRROR_DIR
              )
              return result.stdout.strip(), result.stderr.strip(), result.returncode

          # Get list of all remote branches
          print("Fetching branch list...")
          stdout, stderr, code = git(['branch', '-r', '--format=%(refname:short)'])
          
          if code != 0:
              print(f"Git error: {stderr}")
              exit(1)

          all_branches = [b for b in stdout.split('\n') if b and not b.endswith('/HEAD')]
          print(f"Total remote branches: {len(all_branches)}")

          # Filter out main branches
          skip_patterns = ['master', 'main', 'develop', 'release/', 'gh-pages']
          feature_branches = []
          for branch in all_branches:
              name = branch.replace('origin/', '')
              if not any(name.startswith(p) or name == p for p in skip_patterns):
                  feature_branches.append(branch)
          
          print(f"Feature branches to analyze: {len(feature_branches)}")

          # Process ALL branches
          results = []
          contributor_stats = defaultdict(lambda: {
              'commits': 0, 
              'branches': set(), 
              'last_commit': None,
              'last_ts': 0
          })

          for idx, branch in enumerate(feature_branches, 1):
              name = branch.replace('origin/', '')
              print(f"[{idx}/{len(feature_branches)}] {name}")
              
              try:
                  # Get the most recent commit for this branch
                  # Format: hash|author|email|timestamp|subject
                  stdout, stderr, code = git([
                      'log', '-1', 
                      '--format=%H|%an|%ae|%at|%s',
                      branch
                  ])
                  
                  if code != 0 or not stdout:
                      print(f"  ⚠ No commit data")
                      continue
                  
                  parts = stdout.split('|', 4)
                  if len(parts) != 5:
                      print(f"  ⚠ Parse error: {stdout[:50]}")
                      continue
                  
                  commit_hash, author_name, author_email, ts_str, subject = parts
                  
                  try:
                      timestamp = int(ts_str)
                      if timestamp <= 0:
                          print(f"  ⚠ Invalid timestamp: {ts_str}")
                          continue
                  except ValueError:
                      print(f"  ⚠ Non-numeric timestamp: {ts_str}")
                      continue
                  
                  commit_date = datetime.fromtimestamp(timestamp, tz=timezone.utc).isoformat()
                  
                  # Get ALL unique contributors for this branch (last 100 commits)
                  contributors_stdout, _, _ = git([
                      'log', '-100',
                      '--format=%ae|%an',
                      branch
                  ])
                  
                  branch_contributors = []
                  seen_emails = set()
                  
                  for line in contributors_stdout.split('\n'):
                      if '|' in line:
                          email, name_from_log = line.split('|', 1)
                          if email and email not in seen_emails:
                              seen_emails.add(email)
                              branch_contributors.append({
                                  'email': email,
                                  'name': name_from_log
                              })
                              
                              # Update global stats
                              contributor_stats[email]['commits'] += 1
                              contributor_stats[email]['branches'].add(name)
                              if timestamp > contributor_stats[email]['last_ts']:
                                  contributor_stats[email]['last_commit'] = commit_date
                                  contributor_stats[email]['last_ts'] = timestamp
                  
                  results.append({
                      'name': name,
                      'last_commit': {
                          'hash': commit_hash[:8],
                          'author': author_name,
                          'email': author_email,
                          'date': commit_date,
                          'message': subject[:100]
                      },
                      'contributor_count': len(branch_contributors),
                      'contributors': branch_contributors[:20],  # Store top 20
                      'total_commits': len(contributors_stdout.split('\n')) if contributors_stdout else 0
                  })
                  
              except Exception as e:
                  print(f"  ✗ Error: {e}")
                  continue

          # Sort by most recent activity
          results.sort(key=lambda x: x['last_commit']['date'], reverse=True)

          # Build contributors list
          contributors_list = []
          for email, stats in sorted(
              contributor_stats.items(), 
              key=lambda x: x[1]['commits'], 
              reverse=True
          ):
              if stats['commits'] > 0 and stats['last_commit']:
                  # Get the name from the first branch
                  first_branch = list(stats['branches'])[0]
                  name = contributor_stats[email].get('name', 'Unknown')
                  
                  contributors_list.append({
                      'email': email,
                      'name': name or 'Unknown',
                      'commits': stats['commits'],
                      'branches': sorted(list(stats['branches'])),
                      'last_active': stats['last_commit']
                  })

          output = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'repo': 'XRPLF/rippled',
              'total_branches': len(results),
              'total_contributors': len(contributors_list),
              'branches': results,
              'contributors': contributors_list
          }

          # Save
          os.makedirs('stats/data', exist_ok=True)
          with open('stats/data/branches.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"\n✅ SUCCESS")
          print(f"   Branches: {len(results)}")
          print(f"   Contributors: {len(contributors_list)}")
          print(f"   Sample: {results[0]['name'] if results else 'N/A'}")
          print(f"   Last commit: {results[0]['last_commit']['date'] if results else 'N/A'}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data/branches.json
          
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "Update stats $(date -u +%H:%M UTC)"
          
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              git push origin main
              exit 0
            fi
            echo "Retry $i..."
            sleep 2
          done
          
          exit 1
