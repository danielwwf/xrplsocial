name: Update Amendment Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone XRPL rippled
        run: |
          REPO_DIR="$HOME/rippled"
          
          if [ -d "$REPO_DIR/.git" ]; then
            echo "Updating existing clone..."
            cd "$REPO_DIR"
            git fetch origin
          else
            echo "Creating fresh clone (this will take ~1-2 minutes)..."
            rm -rf "$REPO_DIR"
            git clone --depth=500 https://github.com/XRPLF/rippled.git "$REPO_DIR"
          fi

      - name: Extract branch data
        run: |
          cd "$HOME/rippled"
          
          echo "Remote branches:"
          git branch -r | head -20
          echo ""
          
          python3 << 'PYEOF'
          import subprocess
          import json
          import os
          from datetime import datetime, timezone
          from collections import defaultdict

          REPO_DIR = os.path.expanduser('~/rippled')

          def git(args):
              result = subprocess.run(
                  ['git'] + args,
                  capture_output=True,
                  text=True,
                  cwd=REPO_DIR
              )
              return result.stdout.strip(), result.stderr.strip(), result.returncode

          # Get remote branches
          stdout, stderr, code = git(['branch', '-r', '--format=%(refname:short)'])
          
          if code != 0:
              print(f"Git error: {stderr}")
              exit(1)
          
          all_branches = [b for b in stdout.split('\n') if b and not b.endswith('/HEAD')]
          print(f"Total remote branches: {len(all_branches)}")
          
          # Filter feature branches
          skip = ['master', 'main', 'develop', 'release/', 'gh-pages']
          feature_branches = []
          for branch in all_branches:
              name = branch.replace('origin/', '')
              if not any(name.startswith(p) or name == p for p in skip):
                  feature_branches.append((branch, name))
          
          print(f"Feature branches: {len(feature_branches)}")
          if feature_branches:
              print(f"Examples: {feature_branches[:3]}")

          # Process branches
          results = []
          contributor_stats = defaultdict(lambda: {'commits': 0, 'branches': set(), 'last_commit': None, 'last_ts': 0})

          for full_ref, name in feature_branches[:300]:  # Limit for safety
              try:
                  # Get last commit
                  stdout, _, code = git(['log', '-1', '--format=%H|%an|%ae|%at|%s', full_ref])
                  if code != 0 or not stdout:
                      continue
                  
                  parts = stdout.split('|', 4)
                  if len(parts) != 5:
                      continue
                  
                  hash, author, email, ts_str, msg = parts
                  
                  try:
                      ts = int(ts_str)
                      if ts <= 0:
                          continue
                  except:
                      continue
                  
                  date = datetime.fromtimestamp(ts, tz=timezone.utc).isoformat()
                  
                  # Get contributors
                  contrib_out, _, _ = git(['log', '-30', '--format=%ae|%an', full_ref])
                  contributors = []
                  seen = set()
                  
                  for line in contrib_out.split('\n'):
                      if '|' in line:
                          e, n = line.split('|', 1)
                          if e and e not in seen:
                              seen.add(e)
                              contributors.append({'email': e, 'name': n})
                              contributor_stats[e]['commits'] += 1
                              contributor_stats[e]['branches'].add(name)
                              if ts > contributor_stats[e]['last_ts']:
                                  contributor_stats[e]['last_commit'] = date
                                  contributor_stats[e]['last_ts'] = ts
                  
                  results.append({
                      'name': name,
                      'last_commit': {'hash': hash[:8], 'author': author, 'email': email, 'date': date, 'message': msg[:100]},
                      'contributor_count': len(contributors),
                      'contributors': contributors[:15]
                  })
                  
              except Exception as e:
                  print(f"Error on {name}: {e}")
                  continue

          # Sort and save
          results.sort(key=lambda x: x['last_commit']['date'], reverse=True)
          
          contributors_list = []
          for email, s in sorted(contributor_stats.items(), key=lambda x: x[1]['commits'], reverse=True):
              if s['commits'] > 0 and s['last_commit']:
                  contributors_list.append({
                      'email': email,
                      'name': list(s['branches'])[0],
                      'commits': s['commits'],
                      'branches': sorted(list(s['branches'])),
                      'last_active': s['last_commit']
                  })

          output = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'repo': 'XRPLF/rippled',
              'total_branches': len(results),
              'total_contributors': len(contributors_list),
              'branches': results,
              'contributors': contributors_list
          }

          os.makedirs('stats/data', exist_ok=True)
          with open('stats/data/branches.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"\n✅ SUCCESS: {len(results)} branches, {len(contributors_list)} contributors")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data/branches.json
          git diff --cached --quiet || (git commit -m "Update stats $(date -u +%H:%M)" && git pull --rebase origin main && git push)
