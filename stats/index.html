<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XRPL Amendment Stats</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);
      --accent: #7c5cff;
      --accent-light: #9a7cff;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
      --shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    /* Sexy Scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      margin: 0;
      padding: 22px;
      background: #000;
      color: var(--text);
    }

    .container { width: min(92vw, 1200px); margin: 0 auto; }

    h1 { margin: 0 0 4px 0; letter-spacing: -0.02em; font-size: 28px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }

    .nav { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--accent); font-weight: 500; }
    .nav-separator { color: var(--border); }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { 
      padding: 10px 20px; 
      cursor: pointer; 
      color: var(--muted); 
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { 
      color: var(--accent); 
      border-bottom-color: var(--accent);
      font-weight: 500;
    }

    /* Filter bar */
    .filter-bar { 
      display: flex; 
      gap: 8px; 
      margin-bottom: 16px; 
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn:hover { background: var(--panel2); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      margin-bottom: 16px;
    }

    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); }

    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .stat-row:last-child { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-active { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.35); color: var(--success); }
    .badge-stale { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.35); color: var(--warning); }
    .badge-dormant { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.35); color: var(--danger); }
    .badge-default { background: rgba(124,92,255,0.18); border: 1px solid rgba(124,92,255,0.30); color: rgba(255,255,255,0.88); }

    .amendment-card { transition: transform 0.15s; }
    .amendment-card:hover { transform: translateY(-2px); }

    .amendment-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .amendment-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .amendment-branch { font-size: 12px; color: var(--muted); }

    .contributor-list { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 6px; 
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .contributor {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text);
      transition: all 0.15s;
    }
    .contributor:hover {
      background: rgba(124,92,255,0.2);
      border-color: var(--accent);
      transform: scale(1.02);
    }

    .branch-list {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      max-height: 250px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .branch-item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .branch-item:last-child { border-bottom: none; }
    .branch-name {
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--text);
      font-family: monospace;
      font-size: 11px;
    }

    .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: var(--muted); }
    .meta-item { display: flex; align-items: center; gap: 4px; }

    /* Person card */
    .person-card { display: flex; align-items: center; gap: 12px; }
    .person-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
    }
    .person-info { flex: 1; }
    .person-name { font-weight: 500; }
    .person-meta { font-size: 12px; color: var(--muted); }

    /* Search */
    .search-box {
      width: 100%;
      max-width: 400px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .search-box:focus { outline: none; border-color: var(--accent); }

    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error { text-align: center; padding: 40px 20px; color: var(--danger); }

    .footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0; }
    .footer a { color: var(--accent); }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .tabs { overflow-x: auto; }
    }
  </style>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">← Spaces</a>
      <span class="nav-separator">|</span>
      <a href="/stats/" class="active">Amendment Stats</a>
    </div>

    <h1>XRPL Amendment Stats</h1>
    <div class="sub">Complete contributor activity across all feature branches • Updates every 6 hours</div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="amendments">📦 By Amendment</div>
      <div class="tab" data-tab="people">👥 By Person</div>
      <div class="tab" data-tab="branches">🌿 All Branches</div>
      <div class="tab" data-tab="insights">💡 Insights</div>
    </div>

    <!-- Search -->
    <input type="text" class="search-box hidden" id="search-input" placeholder="Search contributors, branches, or amendments..." />

    <!-- Content -->
    <div id="stats-container">
      <div class="loading">Loading stats...</div>
    </div>

    <div class="footer">
      Data from <a href="https://github.com/XRPLF/rippled" target="_blank">XRPLF/rippled</a> • 
      <span class="badge badge-default" id="last-updated">Loading...</span>
    </div>
  </div>

  <script>
    // Helper: Extract GitHub username from branch name or email
    function extractUsername(nameOrEmail) {
      if (!nameOrEmail) return null;
      // Branch format: "username/branch-name" → return username
      if (nameOrEmail.includes('/')) {
        return nameOrEmail.split('/')[0];
      }
      // Email format: "user@example.com" → return user
      if (nameOrEmail.includes('@')) {
        return nameOrEmail.split('@')[0];
      }
      return nameOrEmail;
    }

    // Helper: Create GitHub links
    function githubLink(type, value) {
      if (!value) return '#';
      if (type === 'branch') return `https://github.com/XRPLF/rippled/tree/${value}`;
      if (type === 'user') return `https://github.com/${value}`;
      return '#';
    }

    let allData = null;
    let currentTab = 'amendments';

    const AMENDMENT_PATTERNS = [
      { regex: /batch|lending/i, name: '📦 Batch & Lending' },
      { regex: /amm|xls-?30/i, name: '💰 AMM (XLS-30)' },
      { regex: /did|decentralized.id/i, name: '🆔 DID' },
      { regex: /permissioned.domain/i, name: '🔒 Permissioned Domains' },
      { regex: /nftoken|nft/i, name: '🎨 NFTokens' },
      { regex: /clawback/i, name: '👋 Clawback' },
      { regex: /bridge|cross.chain/i, name: '🔗 Cross-chain' },
      { regex: /fix/i, name: '🔧 Fix Amendments' },
      { regex: /modular|refactor/i, name: '🏗️ Modularization' },
      { regex: /test|ci|build/i, name: '🧪 CI/Build/Test' },
      { regex: /rust|wasm/i, name: '⚡ Rust/WASM' },
      { regex: /feature|xls/i, name: '✨ Features' }
    ];

    function classifyBranch(branchName) {
      for (const pattern of AMENDMENT_PATTERNS) {
        if (pattern.regex.test(branchName)) return pattern.name;
      }
      return '📁 Other';
    }

    function daysAgo(dateString) {
      if (!dateString) return null;
      const commit = new Date(dateString);
      if (isNaN(commit.getTime())) return null;
      const now = new Date();
      return Math.floor((now - commit) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateString) {
      if (!dateString) return 'unknown';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return 'invalid date';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getActivityStatus(days) {
      if (days === null || isNaN(days)) return { label: 'Unknown', class: 'badge-default' };
      if (days <= 7) return { label: 'Active', class: 'badge-active' };
      if (days <= 30) return { label: 'Recent', class: 'badge-stale' };
      if (days <= 90) return { label: 'Stale', class: 'badge-stale' };
      return { label: 'Dormant', class: 'badge-dormant' };
    }

    async function fetchStats() {
      const response = await fetch('./data/branches.json');
      if (!response.ok) throw new Error('Failed to load data');
      return await response.json();
    }

    function renderAmendments(data) {
      const branches = data?.branches || [];
      
      if (branches.length === 0) {
        return '<div class="card" style="text-align: center; padding: 40px;"><p>No branches found in data.</p></div>';
      }
      
      // Group by amendment
      const byAmendment = {};
      branches.forEach(branch => {
        const type = classifyBranch(branch.name);
        if (!byAmendment[type]) byAmendment[type] = [];
        byAmendment[type].push(branch);
      });

      // Sort amendments by most recent activity
      const sortedAmendments = Object.entries(byAmendment).sort((a, b) => {
        const aLatest = Math.max(...a[1].map(b => new Date(b.last_commit?.date || 0)));
        const bLatest = Math.max(...b[1].map(b => new Date(b.last_commit?.date || 0)));
        return bLatest - aLatest;
      });

      let html = `
        <div class="filter-bar">
          <span style="color: var(--muted); font-size: 13px;">Filter:</span>
          <button class="filter-btn active" data-filter="all">All (${branches.length})</button>
          <button class="filter-btn" data-filter="active">Active (7d)</button>
          <button class="filter-btn" data-filter="recent">Recent (30d)</button>
        </div>
        <div class="grid grid-2">
      `;

      sortedAmendments.forEach(([type, branches]) => {
        const latest = Math.max(...branches.map(b => new Date(b.last_commit?.date || 0)));
        const days = daysAgo(latest);
        const status = getActivityStatus(days);
        
        // Aggregate all contributors
        const allContributors = new Map();
        branches.forEach(b => {
          (b.contributors || []).forEach(c => {
            if (c.email) allContributors.set(c.email, c.name);
          });
        });

        // Sort branches by date (newest first)
        branches.sort((a, b) => new Date(b.last_commit?.date || 0) - new Date(a.last_commit?.date || 0));

        html += `
          <div class="card amendment-card" data-days="${days !== null ? days : 999}">
            <div class="amendment-header">
              <div>
                <div class="amendment-title">${type}</div>
                <div class="amendment-branch">${branches.length} branch${branches.length > 1 ? 'es' : ''} • ${allContributors.size} contributor${allContributors.size !== 1 ? 's' : ''}</div>
              </div>
              <span class="badge ${status.class}">${status.label}</span>
            </div>
            
            <div class="meta-row">
              <div class="meta-item">📅 Last commit: ${days !== null ? (days === 0 ? 'today' : days + ' days ago') : 'unknown'}</div>
            </div>

            <div class="contributor-list">
              ${Array.from(allContributors.entries()).map(([email, name]) => {
                const username = extractUsername(email) || name;
                return `<a href="${githubLink('user', username)}" target="_blank" class="contributor" title="${email}" style="text-decoration: none;">@${username}</a>`;
              }).join('')}
            </div>

            <div class="branch-list">
              ${branches.map(b => {
                const bDays = daysAgo(b.last_commit?.date);
                return `
                <div class="branch-item">
                  <a href="${githubLink('branch', b.name)}" target="_blank" class="branch-name" style="text-decoration: none; color: var(--text);"
>${b.name}</a>
                  <span>${bDays !== null ? (bDays === 0 ? 'today' : bDays + 'd ago') : 'unknown'}</span>
                </div>
              `}).join('')}
            </div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    function renderPeople(data) {
      const contributors = data.contributors || [];
      const branches = data.branches || [];
      
      // Build amendment activity per person
      const personAmendments = {};
      branches.forEach(b => {
        const amendment = classifyBranch(b.name);
        (b.contributors || []).forEach(c => {
          const username = extractUsername(c.email) || c.name;
          if (!personAmendments[username]) {
            personAmendments[username] = new Set();
          }
          personAmendments[username].add(amendment);
        });
      });
      
      let html = `
        <div class="filter-bar">
          <span style="color: var(--muted); font-size: 13px;">${contributors.length} contributors total</span>
        </div>
        <div class="grid grid-2">
      `;

      contributors.slice(0, 100).forEach(person => {
        const username = extractUsername(person.email) || person.name;
        const initials = username.slice(0, 2).toUpperCase();
        const daysSince = person.last_active ? daysAgo(person.last_active) : null;
        const amendments = Array.from(personAmendments[username] || []);
        
        html += `
          <div class="card">
            <div class="person-card">
              <div class="person-avatar">${initials}</div>
              <div class="person-info">
                <a href="${githubLink('user', username)}" target="_blank" class="person-name" style="color: var(--accent); text-decoration: none;">
                  @${username}
                </a>
                <div class="person-meta">
                  ${person.commits} commits • ${person.branches.length} branches
                  ${daysSince !== null ? `• Last active ${daysSince}d ago` : ''}
                </div>
              </div>
            </div>            
            
            ${amendments.length > 0 ? `
              <div style="margin-top: 10px; font-size: 11px; color: var(--muted);">Works on:</div>
              <div class="contributor-list" style="margin-top: 6px;">
                ${amendments.slice(0, 6).map(a => `
                  <span class="contributor">${a}</span>
                `).join('')}
              </div>
            ` : ''}
            
            <div class="contributor-list" style="margin-top: 8px; max-height: 100px;">
              ${person.branches.slice(0, 10).map(b => `
                <a href="${githubLink('branch', b)}" target="_blank" class="contributor" style="text-decoration: none;">${b}</a>
              `).join('')}
              ${person.branches.length > 10 ? `<span class="contributor">+${person.branches.length - 10}</span>` : ''}
            </div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    function renderBranches(data) {
      const branches = (data.branches || []).sort((a, b) => 
        new Date(b.last_commit?.date || 0) - new Date(a.last_commit?.date || 0)
      );

      let html = `
        <div class="filter-bar">
          <span style="color: var(--muted); font-size: 13px;">${branches.length} feature branches (newest first)</span>
        </div>
        <div class="card">
          <div class="branch-list" style="max-height: 70vh;">
      `;

      branches.forEach(b => {
        const days = daysAgo(b.last_commit?.date);
        const status = getActivityStatus(days);
        
        html += `
          <div class="branch-item" style="padding: 10px 0;">
            <div style="display: flex; align-items: center; gap: 12px;">
              <a href="${githubLink('branch', b.name)}" target="_blank" class="branch-name" style="text-decoration: none; color: var(--text);">${b.name}</a>
              <span class="badge ${status.class}" style="font-size: 10px;">${status.label}</span>
            </div>
            <div style="text-align: right; font-size: 12px;">
              <div style="color: var(--muted);">${b.contributors?.length || 1} contributor${(b.contributors?.length || 1) !== 1 ? 's' : ''}</div>
              <div>${days === 0 ? 'today' : days + ' days ago'}</div>
            </div>
          </div>
        `;
      });

      html += '</div></div>';
      return html;
    }

    function renderInsights(data) {
      const branches = data.branches || [];
      const contributors = data.contributors || [];
      
      // Calculate stats
      const activeBranches = branches.filter(b => daysAgo(b.last_commit?.date) <= 7);
      const recentBranches = branches.filter(b => daysAgo(b.last_commit?.date) <= 30);
      const dormantBranches = branches.filter(b => daysAgo(b.last_commit?.date) > 90);
      
      // Top contributor with proper username
      const topContributor = contributors[0];
      const topUsername = topContributor ? (extractUsername(topContributor.email) || topContributor.name) : 'Unknown';
      
      // Amendment activity with contributor counts
      const byAmendment = {};
      branches.forEach(b => {
        const type = classifyBranch(b.name);
        if (!byAmendment[type]) {
          byAmendment[type] = { count: 0, last: 999, contributors: new Set() };
        }
        byAmendment[type].count++;
        const days = daysAgo(b.last_commit?.date);
        if (days < byAmendment[type].last) {
          byAmendment[type].last = days;
        }
        // Count unique contributors
        (b.contributors || []).forEach(c => {
          byAmendment[type].contributors.add(extractUsername(c.email) || c.name);
        });
      });
      
      // Sort amendments by activity (most recent first)
      const sortedAmendments = Object.entries(byAmendment)
        .sort((a, b) => a[1].last - b[1].last)
        .slice(0, 5);
      
      // Find "Amendment Champions" - top contributor per amendment
      const champions = {};
      sortedAmendments.forEach(([type, data]) => {
        // Find most active contributor for this amendment
        const contribs = {};
        branches.filter(b => classifyBranch(b.name) === type).forEach(b => {
          (b.contributors || []).forEach(c => {
            const u = extractUsername(c.email) || c.name;
            contribs[u] = (contribs[u] || 0) + 1;
          });
        });
        const top = Object.entries(contribs).sort((a, b) => b[1] - a[1])[0];
        champions[type] = top ? top[0] : 'Unknown';
      });

      return `
        <!-- Overview Stats -->
        <div class="grid grid-3" style="margin-bottom: 20px;">
          <div class="card">
            <div class="stat-row">
              <span>🟢 Active (7d)</span>
              <span class="badge badge-active">${activeBranches.length}</span>
            </div>
          </div>
          <div class="card">
            <div class="stat-row">
              <span>📅 Recent (30d)</span>
              <span class="badge badge-stale">${recentBranches.length}</span>
            </div>
          </div>
          <div class="card">
            <div class="stat-row">
              <span>🔴 Dormant (90d+)</span>
              <span class="badge badge-dormant">${dormantBranches.length}</span>
            </div>
          </div>
        </div>

        <!-- Hot Amendments (Non-Techie Friendly) -->
        <div class="card" style="margin-bottom: 20px;">
          <h3 style="margin: 0 0 16px; font-size: 18px;">🔥 Hot Amendments — Where the Action Is</h3>
          <p style="color: var(--muted); font-size: 13px; margin: -10px 0 16px;">
            These amendments have the most recent activity. Click a name to see who's working on it.
          </p>
          
          ${sortedAmendments.map(([type, data], idx) => {
            const days = data.last;
            const status = days <= 7 ? '🔥 Very Active' : days <= 30 ? '📅 Active' : '💤 Quiet';
            return `
              <div style="padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); ${idx === sortedAmendments.length-1 ? 'border-bottom: none;' : ''}">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                  <div>
                    <div style="font-weight: 500; font-size: 15px;">${type}</div>
                    <div style="font-size: 12px; color: var(--muted); margin-top: 4px;">
                      ${data.count} branches • ${data.contributors.size} people working on it
                    </div>
                  </div>
                  <div style="text-align: right;">
                    <span class="badge ${days <= 7 ? 'badge-active' : days <= 30 ? 'badge-stale' : 'badge-dormant'}" 
                          style="font-size: 11px;">
                      ${days === 0 ? 'today' : days + ' days ago'}
                    </span>
                    <div style="font-size: 11px; color: var(--accent); margin-top: 6px;">
                      🏆 Led by <a href="${githubLink('user', champions[type])}" target="_blank" style="color: var(--accent);">@${champions[type]}</a>
                    </div>
                  </div>
                </div>
                
                <div class="contributor-list" style="margin-top: 10px;">
                  ${Array.from(data.contributors).slice(0, 8).map(c => `
                    <a href="${githubLink('user', c)}" target="_blank" class="contributor" style="font-size: 11px; text-decoration: none;">@${c}</a>
                  `).join('')}
                  ${data.contributors.size > 8 ? `<span class="contributor" style="font-size: 11px;">+${data.contributors.size - 8}</span>` : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>

        <!-- Top Contributors -->
        <div class="grid grid-2">
          <div class="card">
            <h3 style="margin: 0 0 12px; font-size: 16px;">👑 Top Contributor</h3>
            <div class="person-card">
              <div class="person-avatar">${topUsername.slice(0, 2).toUpperCase()}</div>
              <div class="person-info">
                <a href="${githubLink('user', topUsername)}" target="_blank" class="person-name" style="color: var(--accent); text-decoration: none;">
                  @${topUsername}
                </a>
                <div class="person-meta">${topContributor?.commits || 0} commits across ${topContributor?.branches?.length || 0} branches</div>
              </div>
            </div>
          </div>

          <div class="card">
            <h3 style="margin: 0 0 12px; font-size: 16px;">📊 Quick Stats</h3>
            <div style="font-size: 13px; line-height: 1.8;">
              <div>🔥 <strong>${sortedAmendments.length}</strong> amendments currently active</div>
              <div>👥 <strong>${contributors.length}</strong> total contributors</div>
              <div>🌿 <strong>${branches.length}</strong> feature branches</div>
              <div style="margin-top: 8px; color: var(--muted); font-size: 12px;">
                Last updated: ${formatDate(data.generated_at)}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderContent() {
      if (!allData) return;
      
      const container = document.getElementById('stats-container');
      
      switch(currentTab) {
        case 'amendments':
          container.innerHTML = renderAmendments(allData);
          setupFilters();
          break;
        case 'people':
          container.innerHTML = renderPeople(allData);
          break;
        case 'branches':
          container.innerHTML = renderBranches(allData);
          break;
        case 'insights':
          container.innerHTML = renderInsights(allData);
          break;
      }
    }

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentTab = tab.dataset.tab;
          renderContent();
        });
      });
    }

    function setupFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const filter = btn.dataset.filter;
          document.querySelectorAll('.amendment-card').forEach(card => {
            const days = parseInt(card.dataset.days);
            let show = true;
            
            if (filter === 'active' && days > 7) show = false;
            if (filter === 'recent' && days > 30) show = false;
            
            card.style.display = show ? 'block' : 'none';
          });
        });
      });
    }

    // Initialize with better error handling
    fetchStats()
      .then(data => {
        console.log('Fetched data:', data);
        
        if (!data || !data.branches) {
          throw new Error('Invalid data structure: missing branches array');
        }
        
        if (data.branches.length === 0) {
          document.getElementById('stats-container').innerHTML = `
            <div class="card" style="text-align: center; padding: 40px;">
              <p style="color: var(--muted);">No branch data available yet.</p>
              <p style="font-size: 12px; margin-top: 10px;">Last update: ${data.generated_at || 'unknown'}</p>
              <button onclick="location.reload()" class="filter-btn" style="margin-top: 20px;">Reload</button>
            </div>
          `;
          document.getElementById('last-updated').textContent = 'Updated: ' + formatDate(data.generated_at);
          setupTabs();
          return;
        }
        
        allData = data;
        document.getElementById('last-updated').textContent = 'Updated: ' + formatDate(data.generated_at);
        setupTabs();
        renderContent();
      })
      .catch(err => {
        console.error('Error loading stats:', err);
        document.getElementById('stats-container').innerHTML = `
          <div class="card error" style="text-align: center; padding: 40px;">
            <p>Failed to load stats: ${err.message}</p>
            <button onclick="location.reload()" class="filter-btn" style="margin-top: 20px;">Try Again</button>
          </div>
        `;
      });
  </script>
</body>
</html>
